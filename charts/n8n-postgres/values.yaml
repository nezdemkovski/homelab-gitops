image:
  repository: postgres
  tag: "17.10"
  pullPolicy: IfNotPresent

fullnameOverride: ""

replicaCount: 1

service:
  port: 5432

postgres:
  pgdata: /var/lib/postgresql/data/pgdata
  existingSecret: n8n-env
  databaseKey: DB_POSTGRESDB_DATABASE
  userKey: DB_POSTGRESDB_USER
  passwordKey: DB_POSTGRESDB_PASSWORD

persistence:
  storageClassName: local-path
  size: 5Gi

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6
