{{- $whoop := index .Values "whoop-scraper" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: whoop-scraper-init-db
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: whoop-scraper
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whoop-scraper
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: whoop-scraper
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: init-db
          image: "{{ default "ghcr.io/nezdemkovski/whoop-scraper" $whoop.image.repository }}:{{ $whoop.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" $whoop.image.pullPolicy }}
          args:
            - init-db
          env:
            {{- range $name, $value := $whoop.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: whoop-scraper-env
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
