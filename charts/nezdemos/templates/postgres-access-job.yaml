apiVersion: batch/v1
kind: Job
metadata:
  name: nezdemos-postgres-access
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: nezdemos-postgres-access
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nezdemos-postgres-access
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apply-access
          image: postgres:17.10
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: {{ .Values.postgres.clusterName }}-rw.{{ .Release.Namespace }}.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.postgres.database }}
            - name: PGUSER
              value: {{ .Values.postgres.owner }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nezdemos-postgres-owner
                  key: password
            - name: APP_USER
              value: whoop_scraper
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
                sleep 2
              done

              psql -v ON_ERROR_STOP=1 \
                -v app_user="$APP_USER" <<'SQL'
              GRANT CONNECT, CREATE ON DATABASE nezdemos TO :"app_user";
              SQL
