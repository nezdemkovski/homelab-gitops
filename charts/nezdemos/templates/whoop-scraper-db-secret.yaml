apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: whoop-scraper-db
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: whoop-scraper-db
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.onepassword.item }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.onepassword.item }}
        property: password
