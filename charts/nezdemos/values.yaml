postgres:
  clusterName: nezdemos-postgres
  database: nezdemos
  owner: nezdemos
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10-system-trixie
  storage:
    storageClass: local-path
    size: 5Gi

onepassword:
  postgresItem: nezdemos-postgres
  whoopItem: nezdemos-whoop-scraper
  grafanaReaderItem: nezdemos-grafana-reader
  apiItem: nezdemos-api

nezdemos-api:
  fullnameOverride: nezdemos-api
  image:
    tag: "0.1.1"
  env:
    NEZDEMOS_ADDR: ":8080"
    POSTGRES_HOST: nezdemos-postgres-rw.nezdemos.svc.cluster.local
    POSTGRES_PORT: "5432"
    POSTGRES_DB: nezdemos
    POSTGRES_USER: nezdemos_api
  envFrom:
    - secretRef:
        name: nezdemos-api-env

whoop-scraper:
  fullnameOverride: whoop-scraper
  image:
    tag: "0.1.1"
  env:
    WHOOP_DB_HOST: nezdemos-postgres-rw.nezdemos.svc.cluster.local
    WHOOP_DB_PORT: "5432"
    WHOOP_DB_NAME: nezdemos
    WHOOP_DB_USER: whoop_scraper
    WHOOP_DB_SCHEMA: whoop
    WHOOP_SCRAPE_DAYS: "7"
  envFrom:
    - secretRef:
        name: whoop-scraper-env
  cronJob:
    schedule: "0 14 * * *"
    timeZone: Europe/Prague
    suspend: false
  backfillJob:
    enabled: false
    days: 1000
    nameSuffix: backfill-1000-20260519
  initDb:
    enabled: false
