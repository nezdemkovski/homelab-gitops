apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth.fullname" . }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: AUTH_PUBLIC_BASE_URL
              value: {{ .Values.env.publicBaseUrl | quote }}
            - name: AUTH_AUTO_MIGRATE
              value: {{ .Values.env.autoMigrate | quote }}
            - name: AUTH_ADMIN_EMAIL
              value: {{ .Values.env.adminEmail | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.env.postgresHost | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.env.postgresPort | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.env.postgresDb | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: auth-postgres-owner
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-postgres-owner
                  key: password
          envFrom:
            - secretRef:
                name: auth-env
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
