apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openmarkers-env
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openmarkers-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: postgres://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ $.Values.postgres.clusterName }}-rw.{{ $.Release.Namespace }}.svc.cluster.local:5432/{{ $.Values.postgres.database }}
        ANTHROPIC_API_KEY: '{{ `{{ .anthropicApiKey }}` }}'
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.onepassword.postgresItem }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.onepassword.postgresItem }}
        property: password
    - secretKey: anthropicApiKey
      remoteRef:
        key: {{ .Values.onepassword.appItem }}
        property: ANTHROPIC_API_KEY
