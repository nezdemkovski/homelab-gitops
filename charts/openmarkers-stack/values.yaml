postgres:
  clusterName: openmarkers-postgres
  database: openmarkers
  owner: openmarkers
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10-system-trixie
  storage:
    storageClass: local-path
    size: 2Gi

onepassword:
  postgresItem: openmarkers-postgres
  appItem: openmarkers

openmarkers:
  fullnameOverride: openmarkers
  image:
    repository: ghcr.io/nezdemkovski/openmarkers
  config:
    authBaseUrl: https://auth.nezdemkovski.cloud/api/openmarkers/auth
    authJwksUrl: https://auth.nezdemkovski.cloud/api/openmarkers/auth/.well-known/jwks.json
    authJwtIssuer: https://auth.nezdemkovski.cloud/api/openmarkers
    authJwtAudience: openmarkers,https://auth.nezdemkovski.cloud/api/openmarkers,https://openmarkers.app/mcp
  secret:
    create: false
    name: openmarkers-env
