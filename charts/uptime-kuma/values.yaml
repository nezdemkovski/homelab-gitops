replicaCount: 1

image:
  repository: louislam/uptime-kuma
  tag: "2.4.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

persistence:
  enabled: true
  existingClaim: uptime-kuma-data
  storageClassName: local-path
  size: 5Gi

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 30
