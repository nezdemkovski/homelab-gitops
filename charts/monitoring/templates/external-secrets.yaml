apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-datasources
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-datasources
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: NEZDEMOS_POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.onepassword.nezdemosReaderItem }}
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: PLAUSIBLE_CLICKHOUSE_PASSWORD
      remoteRef:
        key: {{ .Values.onepassword.plausibleItem }}
        property: GRAFANA_CLICKHOUSE_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-mcp-token
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.onepassword.mcpItem }}
        property: token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
