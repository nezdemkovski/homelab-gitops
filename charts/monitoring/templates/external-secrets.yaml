apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-datasources
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-datasources
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: NEZDEMOS_POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.onepassword.nezdemosReaderItem }}
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-mcp-token
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.onepassword.mcpItem }}
        property: token
