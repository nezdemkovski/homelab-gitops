apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cloudflared
  namespace: monitoring
  labels:
    release: monitoring
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: monitoring
spec:
  namespaceSelector:
    matchNames:
      - cloudflared
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
