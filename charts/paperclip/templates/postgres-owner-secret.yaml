apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperclip-postgres-owner
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: paperclip-postgres-owner
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.onepassword.postgresItem }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.onepassword.postgresItem }}
        property: password
