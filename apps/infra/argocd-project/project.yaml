apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    homelab.nezdemkovski.cloud/bootstrap-copy: bootstrap/project.yaml
spec:
  description: Homelab cluster applications
  sourceRepos:
    - https://github.com/nezdemkovski/homelab-gitops.git
    - https://1password.github.io/connect-helm-charts
    - https://charts.containeroo.ch
    - https://charts.external-secrets.io
    - https://cloudnative-pg.github.io/charts
    - https://helm.cilium.io
    - https://imio.github.io/helm-charts
    - https://kubernetes-sigs.github.io/metrics-server/
    - https://prometheus-community.github.io/helm-charts
    - codeberg.org/forgejo-contrib
    - ghcr.io/nezdemkovski/charts
    - ghcr.io/homarr-labs/charts
  destinations:
    - namespace: actual-budget
      server: https://kubernetes.default.svc
    - namespace: auth
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: cloudflared
      server: https://kubernetes.default.svc
    - namespace: cilium-secrets
      server: https://kubernetes.default.svc
    - namespace: cnpg-system
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: forgejo
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: homarr
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: local-path-storage
      server: https://kubernetes.default.svc
    - namespace: n8n
      server: https://kubernetes.default.svc
    - namespace: nezdemos
      server: https://kubernetes.default.svc
    - namespace: openmarkers
      server: https://kubernetes.default.svc
    - namespace: plausible
      server: https://kubernetes.default.svc
    - namespace: uptime-kuma
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: apiregistration.k8s.io
      kind: APIService
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: storage.k8s.io
      kind: StorageClass
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
