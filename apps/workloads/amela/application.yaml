apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amela.io
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: amela.io
  sources:
    - repoURL: ghcr.io/amela-io/charts
      chart: amela-backend
      targetRevision: 0.1.11
      helm:
        releaseName: amela-backend
        values: |
          fullnameOverride: amela-backend
          image:
            repository: ghcr.io/amela-io/backend
            tag: "0.1.11"
            digest: sha256:04c861830cc0bd2872297c4a85c9b869f9261360f0ae02d466fb80675c70e8d4
          imagePullSecrets:
            - name: amela-ghcr
          envSecretName: amela-backend-env
    - repoURL: ghcr.io/amela-io/charts
      chart: amela-application
      targetRevision: 0.1.14
      helm:
        releaseName: amela-application
        values: |
          fullnameOverride: amela-application
          image:
            repository: ghcr.io/amela-io/application
            tag: "0.1.14"
            digest: sha256:d33adf5f195ec0623b3bf6e063465a47897472001814baa024d382eff8e67972
          imagePullSecrets:
            - name: amela-ghcr
  destination:
    server: https://kubernetes.default.svc
    namespace: amela
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
