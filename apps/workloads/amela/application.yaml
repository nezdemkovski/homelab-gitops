apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amela.io
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: amela.io
  sources:
    - repoURL: ghcr.io/amela-io/charts
      chart: amela-backend
      targetRevision: 0.1.7
      helm:
        releaseName: amela-backend
        values: |
          fullnameOverride: amela-backend
          image:
            repository: ghcr.io/amela-io/backend
            tag: "0.1.7"
            digest: sha256:7f6a4d19d1beac42c61ddee230c911bf26829d976f528c5f117725c48192f248
          imagePullSecrets:
            - name: amela-ghcr
          envSecretName: amela-backend-env
    - repoURL: ghcr.io/amela-io/charts
      chart: amela-application
      targetRevision: 0.1.9
      helm:
        releaseName: amela-application
        values: |
          fullnameOverride: amela-application
          image:
            repository: ghcr.io/amela-io/application
            tag: "0.1.9"
            digest: sha256:a3338aa1f19dbf1f0317eab901793701358cdcab4be64d2072bf6dba32bfcf46
          imagePullSecrets:
            - name: amela-ghcr
  destination:
    server: https://kubernetes.default.svc
    namespace: amela
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
