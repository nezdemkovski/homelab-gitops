apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amela.io
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: amela.io
  sources:
    - repoURL: ghcr.io/amela-io/charts
      chart: amela-backend
      targetRevision: 0.1.6
      helm:
        releaseName: amela-backend
        values: |
          fullnameOverride: amela-backend
          image:
            repository: ghcr.io/amela-io/backend
            tag: "0.1.6"
            digest: sha256:bb7109ab285d704ef8a75f8e7471cd2311fe708320a290ebae5e6c26ec4db837
          imagePullSecrets:
            - name: amela-ghcr
          envSecretName: amela-backend-env
    - repoURL: ghcr.io/amela-io/charts
      chart: amela-application
      targetRevision: 0.1.6
      helm:
        releaseName: amela-application
        values: |
          fullnameOverride: amela-application
          image:
            repository: ghcr.io/amela-io/application
            tag: "0.1.6"
            digest: sha256:c92c31f8136b15ffb2c95ef14547d0ef0075493cf45770a529e4af44e76304a3
          imagePullSecrets:
            - name: amela-ghcr
  destination:
    server: https://kubernetes.default.svc
    namespace: amela
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
