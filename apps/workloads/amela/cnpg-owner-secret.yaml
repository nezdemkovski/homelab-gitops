apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: amela-postgres-owner
  namespace: amela
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: amela-postgres-owner
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: amela-postgres
        property: username
    - secretKey: password
      remoteRef:
        key: amela-postgres
        property: password
