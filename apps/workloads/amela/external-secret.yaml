apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: amela-backend-env
  namespace: amela
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: amela-backend-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        NODE_ENV: production
        PORT: "8000"
        TESTING_MODE: "false"
        LOG_LEVEL: info
        DATABASE_URL: 'postgres://{{ .dbUsername | urlquery }}:{{ .dbPassword | urlquery }}@amela-postgres-rw.amela.svc.cluster.local:5432/amela'
        JWT_ACCESS_SECRET: '{{ .jwtAccessSecret }}'
        JWT_REFRESH_SECRET: '{{ .jwtRefreshSecret }}'
        CORS_ALLOWED_ORIGINS: '{{ .corsAllowedOrigins }}'
        CSRF_TRUSTED_ORIGINS: '{{ .csrfTrustedOrigins }}'
        OPENROUTER_API_KEY: '{{ .openrouterApiKey }}'
        CHAT_MODEL: '{{ .chatModel }}'
        EVAL_MODEL: '{{ .evalModel }}'
        TELEGRAM_BOT_TOKEN: '{{ .telegramBotToken }}'
        TELEGRAM_WEBHOOK_URL: '{{ .telegramWebhookUrl }}'
        TELEGRAM_WEBHOOK_SECRET: '{{ .telegramWebhookSecret }}'
        GOOGLE_CLIENT_ID: '{{ .googleClientId }}'
        SENTRY_DSN: '{{ .sentryDsn }}'
        AWS_ACCESS_KEY_ID: '{{ .awsAccessKeyId }}'
        AWS_SECRET_ACCESS_KEY: '{{ .awsSecretAccessKey }}'
        AWS_S3_ENDPOINT_URL: '{{ .awsS3EndpointUrl }}'
        SUPABASE_PROJECT_REF: '{{ .supabaseProjectRef }}'
  data:
    - secretKey: dbUsername
      remoteRef: {key: amela-postgres, property: username}
    - secretKey: dbPassword
      remoteRef: {key: amela-postgres, property: password}
    - secretKey: jwtAccessSecret
      remoteRef: {key: amela-backend, property: JWT_ACCESS_SECRET}
    - secretKey: jwtRefreshSecret
      remoteRef: {key: amela-backend, property: JWT_REFRESH_SECRET}
    - secretKey: corsAllowedOrigins
      remoteRef: {key: amela-backend, property: CORS_ALLOWED_ORIGINS}
    - secretKey: csrfTrustedOrigins
      remoteRef: {key: amela-backend, property: CSRF_TRUSTED_ORIGINS}
    - secretKey: openrouterApiKey
      remoteRef: {key: amela-backend, property: OPENROUTER_API_KEY}
    - secretKey: chatModel
      remoteRef: {key: amela-backend, property: CHAT_MODEL}
    - secretKey: evalModel
      remoteRef: {key: amela-backend, property: EVAL_MODEL}
    - secretKey: telegramBotToken
      remoteRef: {key: amela-backend, property: TELEGRAM_BOT_TOKEN}
    - secretKey: telegramWebhookUrl
      remoteRef: {key: amela-backend, property: TELEGRAM_WEBHOOK_URL}
    - secretKey: telegramWebhookSecret
      remoteRef: {key: amela-backend, property: TELEGRAM_WEBHOOK_SECRET}
    - secretKey: googleClientId
      remoteRef: {key: amela-backend, property: GOOGLE_CLIENT_ID}
    - secretKey: sentryDsn
      remoteRef: {key: amela-backend, property: SENTRY_DSN}
    - secretKey: awsAccessKeyId
      remoteRef: {key: amela-backend, property: AWS_ACCESS_KEY_ID}
    - secretKey: awsSecretAccessKey
      remoteRef: {key: amela-backend, property: AWS_SECRET_ACCESS_KEY}
    - secretKey: awsS3EndpointUrl
      remoteRef: {key: amela-backend, property: AWS_S3_ENDPOINT_URL}
    - secretKey: supabaseProjectRef
      remoteRef: {key: amela-backend, property: SUPABASE_PROJECT_REF}
