apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp-token
  namespace: grafana-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-mcp-token
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: token
      remoteRef:
        key: grafana-mcp
        property: token
