apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nezdemos-postgres
  namespace: nezdemos
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10-system-trixie
  bootstrap:
    initdb:
      database: nezdemos
      owner: whoop_scraper
      secret:
        name: whoop-scraper-db
  storage:
    storageClass: local-path
    size: 5Gi

