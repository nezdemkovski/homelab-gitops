apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: whoop-scraper-db
  namespace: nezdemos
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: whoop-scraper-db
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: nezdemos-whoop-scraper
        property: username
    - secretKey: password
      remoteRef:
        key: nezdemos-whoop-scraper
        property: password

