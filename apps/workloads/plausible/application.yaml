apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plausible
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://imio.github.io/helm-charts
    chart: plausible-analytics
    targetRevision: 0.4.2
    helm:
      valuesObject:
        fullnameOverride: plausible
        image:
          repository: ghcr.io/plausible/community-edition
          tag: v3.2.1
        baseURL: ""
        secret:
          create: false
          existingSecret: plausible-env
        disableRegistration: false
        service:
          type: ClusterIP
          port: 80
        ingress:
          enabled: false
        extraEnv:
          - name: BASE_URL
            valueFrom:
              secretKeyRef:
                name: plausible-env
                key: BASE_URL
        postgresql:
          fullnameOverride: plausible-postgresql
          enabled: true
          auth:
            username: postgres
            database: plausible_db
            existingSecret: plausible-env
            secretKeys:
              adminPasswordKey: POSTGRES_PASSWORD
              userPasswordKey: POSTGRES_PASSWORD
          primary:
            persistence:
              enabled: true
              storageClass: local-path
              size: 5Gi
        clickhouse:
          fullnameOverride: plausible-clickhouse
          enabled: true
          resourcesPreset: none
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            timeoutSeconds: 5
          readinessProbe:
            timeoutSeconds: 5
            failureThreshold: 6
          extraOverrides: |
            <clickhouse>
              <asynchronous_insert_log remove="1" />
              <asynchronous_metric_log remove="1" />
              <error_log remove="1" />
              <metric_log remove="1" />
              <part_log remove="1" />
              <processors_profile_log remove="1" />
              <query_log remove="1" />
              <query_metric_log remove="1" />
              <text_log remove="1" />
              <trace_log remove="1" />
            </clickhouse>
          auth:
            username: clickhouse
            existingSecret: plausible-env
            existingSecretKey: CLICKHOUSE_PASSWORD
          persistence:
            enabled: true
            storageClass: local-path
            size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: plausible
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
