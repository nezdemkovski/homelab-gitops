apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nocodb-env
  namespace: nocodb
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nocodb-env
    creationPolicy: Owner
  data:
    - secretKey: NC_DB
      remoteRef:
        key: nocodb/NC_DB
    - secretKey: NC_AUTH_JWT_SECRET
      remoteRef:
        key: nocodb/NC_AUTH_JWT_SECRET
    - secretKey: NC_CONNECTION_ENCRYPT_KEY
      remoteRef:
        key: nocodb/NC_CONNECTION_ENCRYPT_KEY
    - secretKey: NC_PUBLIC_URL
      remoteRef:
        key: nocodb/NC_PUBLIC_URL
