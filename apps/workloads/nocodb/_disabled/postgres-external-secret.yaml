apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nocodb-postgres-env
  namespace: nocodb
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nocodb-postgres-env
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: nocodb/POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: nocodb/POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: nocodb/POSTGRES_PASSWORD
