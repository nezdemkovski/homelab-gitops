apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fizzy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://github.com/nezdemkovski/homelab-gitops.git
    targetRevision: master
    path: charts/fizzy
    helm:
      releaseName: fizzy
  destination:
    server: https://kubernetes.default.svc
    namespace: fizzy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
