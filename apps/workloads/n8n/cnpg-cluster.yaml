apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-postgres-cnpg
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10-system-trixie
  bootstrap:
    initdb:
      database: n8n
      owner: n8n
      secret:
        name: n8n-cnpg-app
  storage:
    storageClass: local-path
    size: 5Gi
