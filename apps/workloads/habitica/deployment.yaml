apiVersion: apps/v1
kind: Deployment
metadata:
  name: habitica
  namespace: habitica
  labels:
    app.kubernetes.io/name: habitica
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: habitica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: habitica
    spec:
      initContainers:
        - name: wait-for-mongo
          image: mongo:4.4.29
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
          args:
            - |
              until mongo --host habitica-mongo-0.habitica-mongo.habitica.svc.cluster.local --port 27017 --quiet --eval 'if (!db.isMaster().ismaster) quit(1)' >/dev/null 2>&1; do
                sleep 2
              done
      containers:
        - name: habitica
          image: awinterstein/habitica-server:5.46.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_DB_URI
              value: mongodb://habitica-mongo-0.habitica-mongo.habitica.svc.cluster.local:27017/habitica?replicaSet=rs
            - name: BASE_URL
              value: https://habits.nezdemkovski.cloud
            - name: INVITE_ONLY
              value: "false"
            - name: ADMIN_EMAIL
              value: yuri@nezdemkovski.com
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
