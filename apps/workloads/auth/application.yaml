apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.29
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.80
            digest: sha256:f6f271f1080134d95b6789ddcba0c2094e79e2606e5c94f3456d32448bf6264f

        admin:
          image:
            tag: v0.1.80
            digest: sha256:550909c8598c628badf54b71d8b862eab3017869397d60552e3df03ae3a1612e

        login:
          image:
            tag: v0.1.80
            digest: sha256:4356b12cbbb676e2f99f12790129595a3b15a785dfdb4ab1635a14d5a9756a48

        router:
          image:
            tag: v0.1.80
            digest: sha256:77b39c9a24eec322e04a51811bffc205a4bb15d097f717e8f634d0abdf00ad66

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
