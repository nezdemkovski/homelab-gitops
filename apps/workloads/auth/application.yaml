apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.33
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.84
            digest: sha256:0f2f097a45bdbc6eccba78c82ffe5a58c146c93713a9082f8966b2e0faa04083

        admin:
          image:
            tag: v0.1.84
            digest: sha256:94f1301e54e71facbc012e913df945fd8b153fa1031fc626d953783485f7c6b6

        login:
          image:
            tag: v0.1.84
            digest: sha256:b4068f4037f79198ea253a773bebd4c6ee52247c36e38212a408269e925f8476

        router:
          image:
            tag: v0.1.84
            digest: sha256:45ce96db606dc642d6ae9b1cee7479593bae12f406719ddf94d55d684f2e4e2c

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
