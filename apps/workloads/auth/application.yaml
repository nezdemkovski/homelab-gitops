apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.35
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.86
            digest: sha256:1e580d91670c8092a4462bcf2b4b820f627abb8c06f740e26c28efa08c06229a

        admin:
          image:
            tag: v0.1.86
            digest: sha256:a39fbc48453cc34ea5c0063bd50128484b8f1479a963b1bd0bd21a7846786d9a

        login:
          image:
            tag: v0.1.86
            digest: sha256:34b64b606b16afc7f472c878dc776a7d9f80ebb88b2ed03e69ba8a26bb0e02e9

        router:
          image:
            tag: v0.1.86
            digest: sha256:15fb2fa2288a68a0e55ea95d3a10298b42a44752a455bc6d946e94c041644b17

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
