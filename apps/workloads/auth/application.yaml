apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.46
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.97
            digest: sha256:d970370aa9a5b3912c4919402dd9df900778498bc003db5cc96f880f0acbf791

        admin:
          image:
            tag: v0.1.97
            digest: sha256:2915650e47171e576a18a988386b0f31a72dd0a4eef922dac1be232e0ed3a6cc

        login:
          image:
            tag: v0.1.97
            digest: sha256:06a790df4a056d463b01a1238baa3e45438a0362c13f90bec8747eb956710e4a

        router:
          image:
            tag: v0.1.97
            digest: sha256:7d5925729bd76f1aa9b66a33fa9554081da2619916f2194601cd71c8d82948f1

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
