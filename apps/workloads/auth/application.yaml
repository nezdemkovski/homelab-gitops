apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.37
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.88
            digest: sha256:92179775dafc2b477c31bba690ebf26d8fa94310f8e9778b2908be3b746b4d5e

        admin:
          image:
            tag: v0.1.88
            digest: sha256:d37453b038ec307f5cb0be34c10418f030b959387e709986e91f90e7d22aa6af

        login:
          image:
            tag: v0.1.88
            digest: sha256:47608c0a0af0de675ada83167cfb398def5d7b4be86e14c9e49ea11a355ac690

        router:
          image:
            tag: v0.1.88
            digest: sha256:262630d9d0638d3e8e119d8bd38a13f4e75dbdf2d633e8da263c800251bbb92d

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
