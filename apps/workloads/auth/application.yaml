apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.39
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.90
            digest: sha256:026bb3c0d7cae9c7d0270921e930fdecb18872aeb844624ffc1c9056b80e0ad4

        admin:
          image:
            tag: v0.1.90
            digest: sha256:f16dd731c7e81d78af0f4c53eeaf4737e6ba8d7521d936653f364ca083f078d2

        login:
          image:
            tag: v0.1.90
            digest: sha256:ab9237758ca5176d621fa4a6e72d13fd6c1be30ba7cda2e98041ec8e79c252da

        router:
          image:
            tag: v0.1.90
            digest: sha256:6c08501f20118c3036914940a2b7c75d095787010dffb8fcded1fcbe2753d34b

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
