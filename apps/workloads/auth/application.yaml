apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.36
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.87
            digest: sha256:711f5859bd486a43808636c537c1f0769ecc0b2b76816b5624978e00745151ff

        admin:
          image:
            tag: v0.1.87
            digest: sha256:b37f58bed4b75aaf3ad6861134cc31b4474ba8c570a5788e67f6654313491da2

        login:
          image:
            tag: v0.1.87
            digest: sha256:841e2a77f41821727e49b758a51d50feac03f284c33c9167d523471c643d9dbb

        router:
          image:
            tag: v0.1.87
            digest: sha256:34356f9fb2f821c74a591d5a50aa4fe14273994343d9ab582838d52c5db2adb1

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
