apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.30
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.81
            digest: sha256:67c414135dc449198803430f8f75d0d524981b30cb1e3f8c6e3b96bbd47de7fb

        admin:
          image:
            tag: v0.1.81
            digest: sha256:33d3e5acebf4531379ac08263d5ac90aeffbaf08353c9e25e5e8f8db3442075f

        login:
          image:
            tag: v0.1.81
            digest: sha256:715800a0c2bace92b13c3414e788a1234363c776c764cff620ac03964f9d90f5

        router:
          image:
            tag: v0.1.81
            digest: sha256:d964975a4a6ff6542e97dfcfd4c05352e0c054a1df6bf814f659dba60baa6317

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
