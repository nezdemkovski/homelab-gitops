apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.34
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.85
            digest: sha256:69808433396cc5e0ab99a830bad0ff912fa469ce67186e271906420ce49352ef

        admin:
          image:
            tag: v0.1.85
            digest: sha256:d0ca17bc165730e9cd4e4b511e1873155a29a0c5a5c0432bbad07d0017caa649

        login:
          image:
            tag: v0.1.85
            digest: sha256:35fbe8086babf5b4dbb26858c9110ddfe983ee7caf69898f7196e0d8db352d2a

        router:
          image:
            tag: v0.1.85
            digest: sha256:1a3c53c25d05dc241a98d19db8ad795821a619853573395967ecf9c13d027f58

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
