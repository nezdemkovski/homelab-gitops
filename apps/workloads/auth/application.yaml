apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.48
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.99
            digest: sha256:bb35a647ab0b33f179afa43e9738e5592bc41efeeb023f1848a6306027ee59b9

        admin:
          image:
            tag: v0.1.99
            digest: sha256:dfaba3f82262b11b7d23ce50b7d1e3abdbb8f364706b2bbb7db065411291ac25

        login:
          image:
            tag: v0.1.99
            digest: sha256:5e34c1f64c48b16dbb79e35cf53c66375fb029f208dbed9547727859700afc99

        router:
          image:
            tag: v0.1.99
            digest: sha256:653c1ebf1121015f2f5f7bb92f1035a9a53fd40d1956f91a5ee384ff5837c482

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
