apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.43
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.94
            digest: sha256:c83c891a5098f6367c89e6ac57fd0587c5d9cb00ca1466402a42e89a6b6092ad

        admin:
          image:
            tag: v0.1.94
            digest: sha256:5a818f5aebfa745e3ce7cea9a18eab02a7c8027a14c28e755fd56cf9f8a6e3e4

        login:
          image:
            tag: v0.1.94
            digest: sha256:a65213540daf5075bd2c3efeacc98ef991c849cd66ca55eba82520c151fb5070

        router:
          image:
            tag: v0.1.94
            digest: sha256:1125c4a2529280339bd6aab8ed3cb37fa05426e485bb423408eb1c3c5cfd3a90

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
