apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.47
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.98
            digest: sha256:cef847f86746c76568e3c1ab5026bcdc58acae381620000cebd8c9f21cc8a676

        admin:
          image:
            tag: v0.1.98
            digest: sha256:685e35f4ade61f90841a82b4edf3ef886d109817259a10421f6946e8c82ccde1

        login:
          image:
            tag: v0.1.98
            digest: sha256:821cf56ac832be49bfed974c2683097a7deb6b75cc7d1241c3564c89987ffbd3

        router:
          image:
            tag: v0.1.98
            digest: sha256:2e9c0151471a55f84b4ab7f6aac7c289e8e6b7943ba25133af24a927ac54d4fa

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
