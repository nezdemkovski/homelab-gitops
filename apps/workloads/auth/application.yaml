apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.41
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.92
            digest: sha256:86675b926ed70a8da71998016b84c7ad1f1e487cde5039369e2d3aba11eed14b

        admin:
          image:
            tag: v0.1.92
            digest: sha256:59804a26a7918660b6497793d436fc18c7acd7ff9c0132498dfb8873c6dfec44

        login:
          image:
            tag: v0.1.92
            digest: sha256:d74b58be9070c038113193d01b75317f82cc2e997e906cd0b9832793c9ad6252

        router:
          image:
            tag: v0.1.92
            digest: sha256:13af58075cd2575f9fbffd2469f8be24745732707d7b002c4a2d56756f3ff326

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
