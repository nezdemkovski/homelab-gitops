apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.38
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.89
            digest: sha256:7098b41a68e83f9757bb2773c10b5e476ea9c4e0de2b317aaefde85f79da3ceb

        admin:
          image:
            tag: v0.1.89
            digest: sha256:9625a2d397118b6e14848c6bd9e3c0c97261d2da9548925dde4e7c0cbe92a01c

        login:
          image:
            tag: v0.1.89
            digest: sha256:554872c2a153f5f60285eae5b579fec3e75d35f71c901208f8e21b8195852fd3

        router:
          image:
            tag: v0.1.89
            digest: sha256:d68a108be3b9e76c2b145a49834a331cb7ac58ccce83aefd8d4c2c28b7016856

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
