apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.32
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.83
            digest: sha256:ed72ec6c265d5617ed1ee7d2411fde9e11aac4c35075f349b09d017516e20aec

        admin:
          image:
            tag: v0.1.83
            digest: sha256:b2e16bdd56cf2ba3f27df5eb9e79feef94fb040db26c58b6bccf33765458b25e

        login:
          image:
            tag: v0.1.83
            digest: sha256:39a14757d1a325b6f163b1f0be9435a13f3bf5fc7719ef0518af768ed9f6c24f

        router:
          image:
            tag: v0.1.83
            digest: sha256:a8376709b00d04df2f9d04a8688f5e0b99c3a532dcfaa26951841a5da837f956

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
