apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.42
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.93
            digest: sha256:bb9103df81f32a63afd59303c267955d6904803dda964800effdd83a65692fa8

        admin:
          image:
            tag: v0.1.93
            digest: sha256:4b3a121c14315070b4e4bf6d3bec7dd22bc9fb9f0c799e954bcb2923c588d4d2

        login:
          image:
            tag: v0.1.93
            digest: sha256:821a5f2bcbcc96d8dd3d83fad69846ebb0923f2d4d7d2d5dfec71a7765708a90

        router:
          image:
            tag: v0.1.93
            digest: sha256:6b0e288f6b4ba6dfd225f0ac130869c3f87dca444e64077b7e903b883b71bd0f

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
