apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.31
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.82
            digest: sha256:1814503f3ddb2c9ec7f16d2c529518c7c5879b2cef1f430c10a02cb2d37ac449

        admin:
          image:
            tag: v0.1.82
            digest: sha256:b838faae45c291e6d9dcee418da47b68039c9a23cbca3797c10309331643a137

        login:
          image:
            tag: v0.1.82
            digest: sha256:567ac4568d66e4e850c6697e3e62781b91e401f298cc125cdb7d0d0b94e08f97

        router:
          image:
            tag: v0.1.82
            digest: sha256:d391c278f903aae3a936e389a1416ea12dd8449d3219dba7abbc7f28053b42b4

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
