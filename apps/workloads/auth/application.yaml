apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: ghcr.io/nezdemkovski/charts
    chart: auth
    targetRevision: 0.2.45
    helm:
      releaseName: auth
      values: |
        env:
          autoMigrate: "false"
          trustProxyHeaders: "true"
          publicBaseUrl: https://auth.nezdemkovski.cloud
          adminEmail: yuri@nezdemkovski.com
          redisUrlSecret:
            name: auth-redis
            key: REDIS_URL
          postgresHost: auth-postgres-rw.auth.svc.cluster.local
          postgresPort: "5432"
          postgresDb: auth

        api:
          image:
            tag: v0.1.96
            digest: sha256:ec30875505d02dfcfa2c32231d0ff1b1d3d5fa5f50a440ceffcdba08d9c88421

        admin:
          image:
            tag: v0.1.96
            digest: sha256:d86dda571e9adaa0aefd25ec309648a6046c557d66a03f30e72f304f0e3b14a5

        login:
          image:
            tag: v0.1.96
            digest: sha256:f3df50b6ddcd7f699474a2d55a919859882b915f702a8607453a8a9382443b9f

        router:
          image:
            tag: v0.1.96
            digest: sha256:aedc58f4670cdedad9fe66c1d960c4e470289dec200ec8f5e5358f0cd2f0468c

        postgres:
          credentialsSecret:
            name: auth-postgres-owner
            usernameKey: username
            passwordKey: password

        objectStorage:
          enabled: true
          bucket: auth-public
          region: us-east-1
          storage:
            storageClass: local-path
            size: 5Gi

        onepassword:
          appItem: auth
          redisItem: auth-redis
          redisPasswordProperty: password
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
